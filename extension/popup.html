<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Tab Organizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="tab-list" role="list" aria-label="Active localhost tabs" hidden></div>
  <button id="update-titles-btn" type="button" hidden>Update titles</button>
  <div id="empty-state" aria-live="polite" hidden></div>
  <button id="toggle-btn" type="button" aria-pressed="false">Pause</button>
  <label for="rewrite-mode-toggle">
    <input id="rewrite-mode-toggle" type="checkbox" aria-label="Replace page titles entirely (port + name only) instead of prefixing">
    Replace page titles instead of prefixing
  </label>
  <script src="popup.js" type="module"></script>
</body>
</html>
